<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLG Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.card{background:#1e293b;margin:10px;padding:12px;border-radius:10px}
input,select{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{padding:10px;width:100%;background:#f59e0b;border:none;border-radius:8px;color:#fff}
.item{border-bottom:1px solid #333;padding:10px}
</style>
</head>

<body>

<div class="card">
<h3>Game Tracker</h3>

<input type="text" id="searchGame" placeholder="Search/Add Game" onkeyup="searchGame()">
<div id="gameList"></div>

<input type="date" id="date">
<select id="gameSelect"></select>

<input type="number" id="vip" placeholder="VIP">
<input type="number" id="balance" placeholder="Balance">
<input type="number" id="withdraw" placeholder="Withdraw">
<input type="number" id="refer" placeholder="Refer">

<button onclick="save()">Save</button>
</div>

<div class="card">
<h3>Logs</h3>
<select id="filterGame" onchange="render()"></select>
<div id="logs"></div>
</div>

<script>
// DATA
function getGames(){return JSON.parse(localStorage.getItem('games')||'[]')}
function saveGames(g){localStorage.setItem('games',JSON.stringify(g))}
function getLogs(){return JSON.parse(localStorage.getItem('logs')||'[]')}
function saveLogs(l){localStorage.setItem('logs',JSON.stringify(l))}

// INIT
function init(){
let g=getGames();
if(g.length==0){g=["Yono 101z"];saveGames(g)}
updateUI();
render();
}

// GAME LIST
function updateUI(){
let g=getGames();
gameList.innerHTML=g.map(x=>`<div class="item">${x}</div>`).join('');
gameSelect.innerHTML=g.map(x=>`<option>${x}</option>`).join('');
filterGame.innerHTML='<option value="">All</option>'+gameSelect.innerHTML;
}

// SEARCH ADD
function searchGame(){
let val=searchGame.value.toLowerCase();
let g=getGames();
if(val && !g.find(x=>x.toLowerCase()==val)){
if(confirm("Add new game?")){
g.push(searchGame.value);
saveGames(g);
updateUI();
}
}
}

// SAVE ENTRY
function save(){
let logs=getLogs();
logs.unshift({
date:date.value,
game:gameSelect.value,
vip:vip.value,
balance:+balance.value||0,
withdraw:+withdraw.value||0,
refer:refer.value
});
saveLogs(logs);
render();
}

// RENDER
function render(){
let logs=getLogs();
let f=filterGame.value;
logsDiv.innerHTML=logs.filter(l=>!f||l.game==f).map(l=>{
let p=l.withdraw-l.balance;
return `<div class="item">
<b>${l.game}</b><br>
${l.date}<br>
VIP: ${l.vip}<br>
Bal: ₹${l.balance}<br>
With: ₹${l.withdraw}<br>
Ref: ${l.refer}<br>
<b style="color:${p>=0?'#22c55e':'#ef4444'}">Profit ₹${p}</b>
</div>`;
}).join('');
}

// INSTALL POPUP
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
e.preventDefault();
deferredPrompt=e;
let btn=document.createElement("button");
btn.innerText="Install App";
btn.style.position="fixed";
btn.style.bottom="20px";
btn.style.left="50%";
btn.style.transform="translateX(-50%)";
document.body.appendChild(btn);

btn.onclick=()=>{
deferredPrompt.prompt();
deferredPrompt=null;
btn.remove();
};
});

// NOTIFICATION
setTimeout(()=>{
if("Notification" in window){
Notification.requestPermission();
}
},2000);

// SERVICE WORKER
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}

init();
</script>

</body>
</html>
