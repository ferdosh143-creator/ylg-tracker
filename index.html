<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YLG Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.header{padding:15px;text-align:center;font-size:20px;background:#020617}
.card{background:#1e293b;margin:10px;padding:15px;border-radius:12px}
input,select{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#f59e0b;color:#000;font-weight:bold}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#020617}
.nav div{flex:1;text-align:center;padding:12px;cursor:pointer}
.section{display:none;padding-bottom:70px}
.show{display:block}
.profit{color:#22c55e}
.loss{color:#ef4444}

/* Splash */
#splash{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#0f172a;display:flex;justify-content:center;align-items:center;
font-size:40px;font-weight:bold;z-index:9999;
animation:fadeOut 2s forwards 2s;
}
@keyframes fadeOut{to{opacity:0;visibility:hidden}}
</style>
</head>

<body>

<div id="splash">YLG</div>

<div class="header">YLG Tracker</div>

<!-- HOME -->
<div id="home" class="section show">
<div class="card"><div id="stats"></div></div>
<div class="card"><canvas id="chart1"></canvas></div>
<div class="card"><canvas id="chart2"></canvas></div>
</div>

<!-- ADD -->
<div id="add" class="section">
<div class="card">
<input id="gameInput" placeholder="Enter Game Name">
<button onclick="handleGame()">Continue</button>
</div>

<div class="card" id="entryBox" style="display:none;">
<input type="date" id="date">
<input type="number" id="vip" placeholder="VIP Level">
<input type="number" id="balance" placeholder="Balance">
<input type="number" id="withdraw" placeholder="Withdraw">
<input type="number" id="refer" placeholder="Refer Count">
<button onclick="saveEntry()">Save Entry</button>
</div>
</div>

<!-- LOGS -->
<div id="logsPage" class="section">
<div class="card">
<select id="filter" onchange="render()"></select>
<button onclick="exportAll()">Export All</button>
<button onclick="exportOne()">Export Selected</button>
<button onclick="backupData()">Backup</button>
<input type="file" onchange="restoreData(event)">
</div>
<div class="card" id="logs"></div>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="showPage('home')">🏠</div>
<div onclick="showPage('add')">➕</div>
<div onclick="showPage('logsPage')">📜</div>
</div>

<!-- INSTALL -->
<div id="installModal" style="display:none;position:fixed;bottom:20px;left:10px;right:10px;background:#1e293b;padding:15px;border-radius:12px;">
<b>Install App</b>
<p>Add to home screen</p>
<button onclick="installApp()">Install</button>
</div>

<script>

// ===== STORAGE =====
const STORAGE_KEY = "ylg_data";

function getData(){
try{return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {games:[],logs:[]}}
catch{return {games:[],logs:[]}}
}

function saveData(data){
localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ===== NAVIGATION =====
function showPage(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("show"));
document.getElementById(id).classList.add("show");
}

// ===== GAME HANDLING =====
let currentGame="";

function handleGame(){
let name=document.getElementById("gameInput").value.trim();
if(!name)return alert("Enter game name");

let data=getData();

if(!data.games.includes(name)){
if(confirm("Game not found. Add new?")){
data.games.push(name);
saveData(data);
}
}

currentGame=name;
document.getElementById("entryBox").style.display="block";
updateFilter();
}

// ===== SAVE ENTRY =====
function saveEntry(){
let data=getData();

let entry={
game:currentGame,
date:document.getElementById("date").value,
vip:Number(document.getElementById("vip").value)||0,
balance:Number(document.getElementById("balance").value)||0,
withdraw:Number(document.getElementById("withdraw").value)||0,
refer:Number(document.getElementById("refer").value)||0
};

if(!entry.date)return alert("Select date");

data.logs.unshift(entry);
saveData(data);

alert("Saved successfully");
render();
}

// ===== RENDER =====
let chart1,chart2;

function render(){
let data=getData();
let selectedGame=document.getElementById("filter").value;

let html="";
let totalBalance=0,totalWithdraw=0;
let gameProfit={},dateProfit={};

data.logs.forEach(log=>{
if(selectedGame && log.game!==selectedGame) return;

let profit=log.withdraw-log.balance;

totalBalance+=log.balance;
totalWithdraw+=log.withdraw;

gameProfit[log.game]=(gameProfit[log.game]||0)+profit;
dateProfit[log.date]=(dateProfit[log.date]||0)+profit;

html+=`
<div>
<b>${log.game}</b><br>
${log.date}<br>
VIP ${log.vip}<br>
₹${log.balance} → ₹${log.withdraw}<br>
<span class="${profit>=0?'profit':'loss'}">₹${profit}</span>
<hr>
</div>`;
});

document.getElementById("logs").innerHTML=html||"No Data";

// DASHBOARD
let net=totalWithdraw-totalBalance;

document.getElementById("stats").innerHTML=
`Balance ₹${totalBalance}<br>
Withdraw ₹${totalWithdraw}<br>
<b class="${net>=0?'profit':'loss'}">Net ₹${net}</b>`;

// CHARTS
if(typeof Chart!=="undefined"){
if(chart1) chart1.destroy();
chart1=new Chart(document.getElementById("chart1"),{
type:"line",
data:{labels:Object.keys(dateProfit),
datasets:[{label:"Profit Trend",data:Object.values(dateProfit)}]}
});

if(chart2) chart2.destroy();
chart2=new Chart(document.getElementById("chart2"),{
type:"bar",
data:{labels:Object.keys(gameProfit),
datasets:[{label:"Game Profit",data:Object.values(gameProfit)}]}
});
}

updateFilter();
}

// ===== FILTER =====
function updateFilter(){
let games=getData().games;
let dropdown=document.getElementById("filter");

dropdown.innerHTML='<option value="">All Games</option>'+
games.map(g=>`<option>${g}</option>`).join("");
}

// ===== EXPORT =====
function exportAll(){
downloadCSV(getData().logs,"all_data.csv");
}

function exportOne(){
let game=document.getElementById("filter").value;
if(!game)return alert("Select a game");

let logs=getData().logs.filter(l=>l.game===game);
downloadCSV(logs,game+"_data.csv");
}

function downloadCSV(data,fileName){
let csv="Game,Date,VIP,Balance,Withdraw,Refer\n";
data.forEach(d=>{
csv+=`${d.game},${d.date},${d.vip},${d.balance},${d.withdraw},${d.refer}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=fileName;
a.click();
}

// ===== BACKUP =====
function backupData(){
let blob=new Blob([JSON.stringify(getData())]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

function restoreData(e){
let reader=new FileReader();
reader.onload=()=>{
localStorage.setItem(STORAGE_KEY, reader.result);
alert("Data Restored!");
location.reload();
};
reader.readAsText(e.target.files[0]);
}

// ===== INSTALL =====
let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installModal").style.display="block";
});

function installApp(){
if(deferredPrompt){
deferredPrompt.prompt();
deferredPrompt=null;
document.getElementById("installModal").style.display="none";
}
}

// ===== SERVICE WORKER =====
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js");
}

// ===== INIT =====
window.onload=render;

</script>

</body>
</html>
