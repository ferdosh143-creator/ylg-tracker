<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YLG Tracker</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.card{background:#1e293b;margin:10px;padding:12px;border-radius:10px}
input,select{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px}
button{padding:10px;width:100%;background:#f59e0b;border:none;border-radius:8px;color:#fff}
.item{border-bottom:1px solid #333;padding:10px}
.profit{color:#22c55e}
.loss{color:#ef4444}
</style>
</head>

<body>

<div class="card">
<h3>🔍 Search / Add Game</h3>
<input type="text" id="search" placeholder="Enter game name">
<button onclick="handleGame()">Continue</button>
</div>

<div class="card" id="entryBox" style="display:none;">
<h3>➕ Add Entry</h3>

<input type="date" id="date">
<input type="number" id="vip" placeholder="VIP">
<input type="number" id="bal" placeholder="Balance">
<input type="number" id="with" placeholder="Withdraw">
<input type="number" id="ref" placeholder="Refer">

<button onclick="saveEntry()">Save Entry</button>
</div>

<div class="card">
<h3>📊 Top Games</h3>
<div id="topGames"></div>
</div>

<div class="card">
<h3>📜 Logs</h3>

<select id="filter" onchange="render()">
<option value="">All Games</option>
</select>

<button onclick="exportAll()">Export All</button>
<button onclick="exportOne()">Export Selected</button>

<div id="logs"></div>
</div>

<script>

let currentGame="";

// STORAGE
function getGames(){return JSON.parse(localStorage.getItem('games')||'[]')}
function saveGames(g){localStorage.setItem('games',JSON.stringify(g))}
function getLogs(){return JSON.parse(localStorage.getItem('logs')||'[]')}
function saveLogs(l){localStorage.setItem('logs',JSON.stringify(l))}

// SEARCH / ADD
function handleGame(){
let name=search.value.trim();
if(!name){alert("Enter game name");return;}

let games=getGames();

if(games.includes(name)){
currentGame=name;
alert("Game found! Add entry.");
}else{
if(confirm("Game not found. Add new game?")){
games.push(name);
saveGames(games);
currentGame=name;
}
}

entryBox.style.display="block";
updateFilter();
}

// SAVE ENTRY
function saveEntry(){
let logs=getLogs();

let entry={
game:currentGame,
date:date.value,
vip:vip.value,
bal:+bal.value||0,
with:+with.value||0,
ref:ref.value
};

logs.unshift(entry);
saveLogs(logs);

alert("Saved!");
render();
}

// RENDER LOGS
function render(){
let logs=getLogs();
let f=filter.value;

let html="";

logs.filter(l=>!f||l.game==f).forEach(l=>{
let p=l.with-l.bal;

html+=`
<div class="item">
<b>${l.game}</b><br>
${l.date}<br>
VIP: ${l.vip}<br>
Bal: ₹${l.bal}<br>
With: ₹${l.with}<br>
Ref: ${l.ref}<br>
<span class="${p>=0?'profit':'loss'}">Profit ₹${p}</span>
</div>
`;
});

document.getElementById("logs").innerHTML=html||"No Data";

updateTopGames();
}

// UPDATE FILTER
function updateFilter(){
let games=getGames();
filter.innerHTML='<option value="">All</option>' + 
games.map(g=>`<option>${g}</option>`).join('');
}

// EXPORT ALL
function exportAll(){
let logs=getLogs();
downloadCSV(logs,"all_data.csv");
}

// EXPORT ONE
function exportOne(){
let f=filter.value;
if(!f){alert("Select game first");return;}

let logs=getLogs().filter(l=>l.game==f);
downloadCSV(logs,f+"_data.csv");
}

// DOWNLOAD CSV
function downloadCSV(data,file){
let csv="Game,Date,VIP,Balance,Withdraw,Refer\n";

data.forEach(d=>{
csv+=`${d.game},${d.date},${d.vip},${d.bal},${d.with},${d.ref}\n`;
});

let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=file;
a.click();
}

// TOP GAMES
function updateTopGames(){
let logs=getLogs();
let map={};

logs.forEach(l=>{
let p=l.with-l.bal;
map[l.game]=(map[l.game]||0)+p;
});

let sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,3);

topGames.innerHTML=sorted.map(g=>
`<div>${g[0]}: ₹${g[1]}</div>`
).join('');
}

// INIT
updateFilter();
render();

</script>

</body>
</html>
